services:
  postgres:
    image: postgres:16-alpine
    container_name: animalwiki-postgres
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-animalwiki}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
